<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>머니카운팅 - Money Counting</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            color: #1a1a1a;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 420px;
            background: #f8f9fa;
            padding: 40px 30px;
            border-radius: 20px;
            min-height: 600px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }

        .header {
            margin-bottom: 17px;
        }

        .title {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #1a1a1a;
        }

        .highlight {
            color: #0051FF;
        }

        .subtitle {
            font-size: 13px;
            color: #666;
            line-height: 1.6;
        }

        .section {
            margin-bottom: 10px;
        }

        .section-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .button-group {
            display: flex;
            gap: 10px;
        }

        .btn-tab {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            background: #ffffff;
            color: #666;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-tab.active {
            border-color: #0051FF;
            background: rgba(0, 81, 255, 0.1);
            color: #0051FF;
        }

        .input-group {
            margin-bottom: 18px;
        }

        .input-label {
            display: block;
            font-size: 12px;
            color: #666;
            margin-bottom: 8px;
            font-weight: 500;
        }

        input[type="text"],
        input[type="number"],
        input[type="time"],
        select {
            width: 100%;
            padding: 12px 10px;
            border: 1px solid #ddd;
            background: #ffffff;
            color: #1a1a1a;
            border-radius: 10px;
            font-size: 13px;
            font-family: inherit;
        }

        select option {
            color: #1a1a1a;
            background: #ffffff;
            font-size: 13px;
        }

        input::placeholder {
            color: #999;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: #0051FF;
            box-shadow: 0 0 0 2px rgba(0, 81, 255, 0.1);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px;
            background: rgba(0, 81, 255, 0.08);
            border: 1px solid rgba(0, 81, 255, 0.3);
            border-radius: 10px;
            cursor: pointer;
        }

        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #0051FF;
        }

        .checkbox-label {
            font-size: 13px;
            color: #1a1a1a;
            cursor: pointer;
            flex: 1;
        }

        .guide-text {
            font-size: 11px;
            color: #666;
            margin-top: 8px;
            padding: 10px;
            background: #f0f0f0;
            border-radius: 8px;
            border-left: 2px solid #0051FF;
        }

        .btn-primary {
            width: 100%;
            padding: 16px;
            background: #0051FF;
            border: none;
            color: #fff;
            font-size: 15px;
            font-weight: 700;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: auto;
        }

        .btn-primary:hover {
            background: #0041CC;
        }

        /* 메인 화면 */
        .main-screen {
            display: none;
            flex-direction: column;
        }

        .main-screen.active {
            display: flex;
        }

        .main-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .settings-btn {
            width: 36px;
            height: 36px;
            border: 1px solid #ddd;
            background: #ffffff;
            color: #666;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.2s;
        }

        .settings-btn:hover {
            border-color: #0051FF;
            color: #0051FF;
        }

        .current-amount {
            text-align: center;
            margin-bottom: 50px;
        }

        .amount-label {
            font-size: 12px;
            color: #0051FF;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .amount-value {
            font-size: clamp(24px, 10vw, 40px);
            font-weight: 800;
            color: #0051FF;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', monospace;
            margin-bottom: 20px;
            word-break: break-all;
        }

        .disclaimer-text {
            font-size: 11px;
            color: #999;
            text-align: center;
            margin-bottom: 12px;
            line-height: 1.4;
        }

        .progress-section {
            background: rgba(0, 81, 255, 0.1);
            border: 1px solid rgba(0, 81, 255, 0.3);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
        }

        .progress-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #0051FF, #3D7FFF);
            transition: width 0.3s;
        }

        .progress-text {
            font-size: 13px;
            color: #0051FF;
            font-weight: 600;
        }

        .items-text {
            font-size: 12px;
            color: #0051FF;
            margin-bottom: 30px;
            min-height: 20px;
            text-align: center;
        }

        .subtitle-text {
            font-size: 11px;
            color: #999;
            line-height: 1.5;
            text-align: center;
            margin-top: 15px;
        }

        .reset-btn {
            width: 100%;
            padding: 14px;
            background: #ffffff;
            border: 1px solid #ddd;
            color: #666;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .reset-btn:hover {
            border-color: #0051FF;
            color: #0051FF;
        }

        .hidden {
            display: none !important;
        }

        .two-column {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        #toss-ad-container {
            display: none;
            margin-bottom: 20px;
        }

        #toss-ad-container.show {
            display: block;
        }

        #perSecondSection {
            background: rgba(0, 81, 255, 0.08);
            border: 1px solid rgba(0, 81, 255, 0.2);
            border-radius: 8px;
            padding: 12px;
            text-align: center;
            margin-bottom: 20px;
        }

        #perSecondAmount {
            font-size: 16px;
            font-weight: 700;
            color: #0051FF;
            margin: 6px 0;
        }

        #workStatusMessage {
            font-size: 11px;
            color: #999;
            line-height: 1.4;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 설정 화면 -->
        <div class="settings-screen" id="settingsScreen">
            <div class="header">
                <div class="title">어차피 나는<br><span class="highlight">지금도 번다</span></div>
            </div>

            <!-- 1단계: 급여 방식 -->
            <div class="section">
                <div class="section-label">급여 방식</div>
                <div class="button-group">
                    <button class="btn-tab active" data-salary-type="hourly">시급</button>
                    <button class="btn-tab" data-salary-type="monthly">월급</button>
                    <button class="btn-tab" data-salary-type="annual">연봉</button>
                </div>
            </div>

            <!-- 2단계: 금액 입력 -->
            <div class="section">
                <div class="input-group">
                    <label class="input-label" id="amountLabel">시급 입력 (원)</label>
                    <input type="text" id="amountInput" placeholder="예: 12000" inputmode="numeric">
                </div>
                <div class="guide-text" id="guideText">시급을 입력해주세요</div>
            </div>

            <!-- 3단계: 세후 여부 -->
            <div class="section">
                <label class="checkbox-group">
                    <input type="checkbox" id="afterTaxCheckbox">
                    <span class="checkbox-label">이미 세후(실수령액)로 입력했습니다</span>
                </label>
                <div class="guide-text">체크하지 않으면 평균 실수령액(약 75%) 기준으로 자동 계산됩니다</div>
            </div>

            <!-- 4단계: 휴게시간 -->
            <div class="section">
                <div class="section-label">휴게 시간 (시간)</div>
                <input type="number" id="breakTime" value="1" min="0" max="5" placeholder="1">
                <div class="guide-text">휴게 시간만 입력하세요 (특정 시간대는 상관없음)</div>
            </div>

            <!-- 5단계: 근무 시간대 -->
            <div class="section">
                <div class="section-label">근무 시간대</div>
                <div class="two-column">
                    <div class="input-group">
                        <label class="input-label">시작 시간</label>
                        <div style="display: flex; gap: 8px;">
                            <select id="startAmpm">
                                <option value="am">오전</option>
                                <option value="pm">오후</option>
                            </select>
                            <input type="number" id="startHour" min="1" max="12" value="9" placeholder="시간">
                        </div>
                    </div>
                    <div class="input-group">
                        <label class="input-label">종료 시간</label>
                        <div style="display: flex; gap: 8px;">
                            <select id="endAmpm">
                                <option value="am">오전</option>
                                <option value="pm" selected>오후</option>
                            </select>
                            <input type="number" id="endHour" min="1" max="12" value="6" placeholder="시간">
                        </div>
                    </div>
                </div>
            </div>

            <!-- 6단계: 공휴일 설정 -->
            <div class="section">
                <label class="checkbox-group">
                    <input type="checkbox" id="isHolidayToday">
                    <span class="checkbox-label">📅 오늘을 공휴일로 표시하기</span>
                </label>
                <div class="guide-text">임시공휴일, 대체공휴일, 또는 개인 휴무일을 지정하세요</div>
            </div>

            <button class="btn-primary" id="saveBtn">저장하고 시작</button>
        </div>

        <!-- 메인 화면 -->
        <div class="main-screen" id="mainScreen">
            <div class="main-header">
                <div>
                    <div class="title" style="margin-bottom: 4px;">머니 카운팅</div>
                    <div style="font-size: 13px; color: #0051FF; font-weight: 600;">Money Counting 🤑</div>
                </div>
                <button class="settings-btn" id="editBtn">⚙️</button>
            </div>

            <div id="toss-ad-container"></div>

            <div class="current-amount" id="currentAmountSection">
                <div class="amount-label">📅 오늘 현재까지 벌어들인 금액</div>
                <div class="amount-value" id="currentAmount">₩0</div>
                <div class="items-text" id="itemsText"></div>
                <div class="subtitle-text">팀장이 욕할때도, 근무시간에 💩쌀때도,<br>고객이 욕할때도 나는 돈을 번다.<br><span style="font-weight: 700;">참자 참자 참자!</span></div>
            </div>

            <div class="progress-section">
                <div class="progress-label">오늘 근무 진행률</div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                </div>
                <div class="progress-text" id="progressText">0%</div>
            </div>

            <div style="background: rgba(0, 81, 255, 0.08); border: 1px solid rgba(0, 81, 255, 0.2); border-radius: 8px; padding: 12px; text-align: center; margin-bottom: 20px;" id="perSecondSection">
                <div style="font-size: 12px; color: #666; margin-bottom: 6px;">1초당 벌 수 있는 금액</div>
                <div style="font-size: 16px; font-weight: 700; color: #0051FF; margin-bottom: 8px;" id="perSecondAmount">₩0</div>
                <div style="font-size: 11px; color: #999; line-height: 1.4;" id="workStatusMessage"></div>
            </div>

            <button class="reset-btn" id="resetBtn">설정 변경</button>
        </div>
    </div>

    <script>
        // 고정 공휴일 (YYYY-MM-DD 형식)
        const FIXED_HOLIDAYS = [
            '01-01', // 신정
            '03-01', // 삼일절
            '04-05', // 어린이날
            '06-06', // 현충일
            '08-15', // 광복절
            '10-03', // 개천절
            '10-09', // 한글날
            '12-25'  // 성탄절
        ];

        // 2025년 음력 공휴일
        const LUNAR_HOLIDAYS_2025 = [
            '01-28', // 설날 전날
            '01-29', // 설날
            '01-30', // 설날 다음날
            '04-30', // 부처님 오신 날
            '10-04', // 추석 전날
            '10-05', // 추석
            '10-06'  // 추석 다음날
        ];

        // 2026년 음력 공휴일
        const LUNAR_HOLIDAYS_2026 = [
            '02-16', // 설날 전날
            '02-17', // 설날
            '02-18', // 설날 다음날
            '05-02', // 부처님 오신 날
            '09-24', // 추석 전날
            '09-25', // 추석
            '09-26'  // 추석 다음날
        ];

        // 2027년 음력 공휴일
        const LUNAR_HOLIDAYS_2027 = [
            '02-05', // 설날 전날
            '02-06', // 설날
            '02-07', // 설날 다음날
            '04-21', // 부처님 오신 날
            '09-14', // 추석 전날
            '09-15', // 추석
            '09-16'  // 추석 다음날
        ];

        // 2028년 음력 공휴일
        const LUNAR_HOLIDAYS_2028 = [
            '01-25', // 설날 전날
            '01-26', // 설날
            '01-27', // 설날 다음날
            '04-10', // 부처님 오신 날
            '10-02', // 추석 전날
            '10-03', // 추석
            '10-04'  // 추석 다음날
        ];

        let settings = null;
        let isRunning = false;
        let animationFrameId = null;
        let acquiredItems = new Set();
        let itemTimeouts = [];

        // 요소 가져오기
        const settingsScreen = document.getElementById('settingsScreen');
        const mainScreen = document.getElementById('mainScreen');
        const salaryTypeButtons = document.querySelectorAll('.btn-tab');
        const amountInput = document.getElementById('amountInput');
        const amountLabel = document.getElementById('amountLabel');
        const guideText = document.getElementById('guideText');
        const afterTaxCheckbox = document.getElementById('afterTaxCheckbox');
        const breakTime = document.getElementById('breakTime');
        const startAmpm = document.getElementById('startAmpm');
        const startHour = document.getElementById('startHour');
        const endAmpm = document.getElementById('endAmpm');
        const endHour = document.getElementById('endHour');
        const isHolidayToday = document.getElementById('isHolidayToday');
        const saveBtn = document.getElementById('saveBtn');
        const editBtn = document.getElementById('editBtn');
        const resetBtn = document.getElementById('resetBtn');
        const currentAmount = document.getElementById('currentAmount');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        const itemsText = document.getElementById('itemsText');

        let selectedSalaryType = 'hourly';

        // 오늘의 공휴일 여부 확인
        function isHoliday(date) {
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const mmdd = `${month}-${day}`;
            const year = date.getFullYear();

            // 고정 공휴일 확인
            if (FIXED_HOLIDAYS.includes(mmdd)) return true;

            // 음력 공휴일 확인
            if (year === 2024 && LUNAR_HOLIDAYS_2024.includes(mmdd)) return true;
            if (year === 2025 && LUNAR_HOLIDAYS_2025.includes(mmdd)) return true;
            if (year === 2026 && LUNAR_HOLIDAYS_2026.includes(mmdd)) return true;
            if (year === 2027 && LUNAR_HOLIDAYS_2027.includes(mmdd)) return true;
            if (year === 2028 && LUNAR_HOLIDAYS_2028.includes(mmdd)) return true;

            return false;
        }

        // 시간 변환 함수 (12시간 → 24시간)
        function convertTo24Hour(ampm, hour) {
            let h = parseInt(hour) || 9;
            if (ampm === 'pm' && h !== 12) {
                h += 12;
            } else if (ampm === 'am' && h === 12) {
                h = 0;
            }
            return String(h).padStart(2, '0') + ':00';
        }

        // 24시간 → 12시간 변환
        function convertTo12Hour(timeStr) {
            const [hour] = timeStr.split(':');
            let h = parseInt(hour);
            const ampm = h >= 12 ? 'pm' : 'am';
            if (h > 12) {
                h -= 12;
            } else if (h === 0) {
                h = 12;
            }
            return { ampm, hour: h };
        }

        // 급여 방식 선택
        salaryTypeButtons.forEach(btn => {
            btn.addEventListener('click', (e) => {
                salaryTypeButtons.forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                selectedSalaryType = e.target.dataset.salaryType;

                const labels = {
                    hourly: '시급 입력 (원)',
                    monthly: '월급 입력 (원)',
                    annual: '연봉 입력 (원)'
                };
                const guides = {
                    hourly: '시급을 입력해주세요',
                    monthly: '월급을 입력해주세요',
                    annual: '연봉을 입력해주세요'
                };

                amountLabel.textContent = labels[selectedSalaryType];
                guideText.textContent = guides[selectedSalaryType];
                amountInput.value = '';
                amountInput.focus();
            });
        });

        // 숫자 입력 포맷팅
        amountInput.addEventListener('input', (e) => {
            let value = e.target.value.replace(/[^\d]/g, '');
            if (value) {
                value = parseInt(value).toLocaleString('ko-KR');
            }
            e.target.value = value;
        });

        // 저장
        saveBtn.addEventListener('click', () => {
            const rawAmount = amountInput.value.replace(/,/g, '');
            const amount = parseFloat(rawAmount);

            if (!amount || amount <= 0) {
                alert('올바른 금액을 입력해주세요.');
                return;
            }

            const bTime = parseInt(breakTime.value) || 1;
            const sTime = convertTo24Hour(startAmpm.value, startHour.value);
            const eTime = convertTo24Hour(endAmpm.value, endHour.value);
            const isAfterTax = afterTaxCheckbox.checked;
            const isCustomHoliday = isHolidayToday.checked;

            settings = {
                salaryType: selectedSalaryType,
                amount: amount,
                afterTax: isAfterTax,
                breakTime: bTime,
                startTime: sTime,
                endTime: eTime,
                isCustomHoliday: isCustomHoliday,
                savedAt: new Date().toISOString()
            };

            // 로컬스토리지에 저장
            localStorage.setItem('salaryLiveSettings', JSON.stringify(settings));

            // 화면 전환
            showMainScreen();
        });

        // 설정 변경
        editBtn.addEventListener('click', () => {
            loadSettingsToForm();
            showSettingsScreen();
        });

        // 리셋
        resetBtn.addEventListener('click', () => {
            loadSettingsToForm();
            showSettingsScreen();
        });

        // 설정값을 폼에 로드
        function loadSettingsToForm() {
            if (!settings) return;

            // 급여 방식 선택
            salaryTypeButtons.forEach(btn => {
                if (btn.dataset.salaryType === settings.salaryType) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
            selectedSalaryType = settings.salaryType;

            // 금액 입력
            amountInput.value = settings.amount.toLocaleString('ko-KR');

            // 세후 체크
            afterTaxCheckbox.checked = settings.afterTax;

            // 휴게 시간
            breakTime.value = settings.breakTime;

            // 공휴일 체크
            isHolidayToday.checked = settings.isCustomHoliday;

            // 시간대 변환 및 표시
            const startConverted = convertTo12Hour(settings.startTime);
            const endConverted = convertTo12Hour(settings.endTime);

            startAmpm.value = startConverted.ampm;
            startHour.value = startConverted.hour;
            endAmpm.value = endConverted.ampm;
            endHour.value = endConverted.hour;

            // 라벨 업데이트
            const labels = {
                hourly: '시급 입력 (원)',
                monthly: '월급 입력 (원)',
                annual: '연봉 입력 (원)'
            };
            amountLabel.textContent = labels[settings.salaryType];
        }

        // 화면 표시
        function showSettingsScreen() {
            settingsScreen.classList.remove('hidden');
            mainScreen.classList.remove('active');
        }

        function showMainScreen() {
            settingsScreen.classList.add('hidden');
            mainScreen.classList.add('active');
            startCounting();
        }

        // 시급 계산
        function getHourlyRate(amount, salaryType, afterTax) {
            let hourly = 0;

            if (salaryType === 'hourly') {
                hourly = amount;
            } else if (salaryType === 'monthly') {
                hourly = amount / 160;
            } else if (salaryType === 'annual') {
                hourly = amount / 2080;
            }

            if (!afterTax) {
                hourly = hourly * 0.75;
            }

            return hourly;
        }

        // 초당 금액
        function getSecondlyRate(hourly) {
            return hourly / 3600;
        }

        // 카운팅 시작
        function startCounting() {
            if (!settings) return;

            isRunning = true;
            acquiredItems.clear();
            itemTimeouts.forEach(t => clearTimeout(t));
            itemTimeouts = [];

            const hourly = getHourlyRate(settings.amount, settings.salaryType, settings.afterTax);
            const secondly = getSecondlyRate(hourly);

            function update() {
                const now = new Date();
                const dayOfWeek = now.getDay(); // 0=일, 1=월, ..., 6=토
                const isWeekend = dayOfWeek === 0 || dayOfWeek === 6;
                const isPublicHoliday = isHoliday(now);
                const isCustomHoliday = settings.isCustomHoliday;
                const isSomethingHoliday = isWeekend || isPublicHoliday || isCustomHoliday;

                const [startHour, startMin] = settings.startTime.split(':').map(Number);
                const [endHour, endMin] = settings.endTime.split(':').map(Number);

                // 근무시간 계산
                const totalHours = endHour - startHour;
                const breakHours = settings.breakTime || 1;
                const actualWorkHours = Math.max(totalHours - breakHours, 1);
                
                const startDate = new Date(now.getFullYear(), now.getMonth(), now.getDate(), startHour, startMin);
                const endDate = new Date(now.getFullYear(), now.getMonth(), now.getDate(), endHour, endMin);

                // 초당 금액 표시
                const perSecondAmount = Math.round(secondly * 100) / 100;
                const perSecondFormatted = new Intl.NumberFormat('ko-KR', {
                    style: 'currency',
                    currency: 'KRW',
                    minimumFractionDigits: 0,
                    maximumFractionDigits: 0
                }).format(perSecondAmount);
                
                document.getElementById('perSecondAmount').textContent = perSecondFormatted;

                let workTimeElapsed = 0;
                let totalWorkSeconds = actualWorkHours * 3600;
                let isBeforeWork = false;
                let isOffWork = false;
                let isWorkTime = false;

                // 근무 상태 판단
                if (isSomethingHoliday) {
                    // 주말/공휴일
                    isOffWork = true;
                    document.getElementById('currentAmountSection').style.display = 'none';
                    document.getElementById('workStatusMessage').textContent = '';
                    progressText.textContent = '오늘은 쉬는 날입니다 🌴';
                } else if (now < startDate) {
                    // 근무 시간 전
                    isBeforeWork = true;
                    document.getElementById('currentAmountSection').style.display = 'block';
                    document.getElementById('workStatusMessage').textContent = '';
                    progressText.textContent = '근무 준비중';
                } else if (now >= endDate) {
                    // 근무 시간 후 (퇴근함)
                    isOffWork = true;
                    document.getElementById('currentAmountSection').style.display = 'block';
                    document.getElementById('workStatusMessage').textContent = '';
                    progressText.textContent = '근무시간이 아닙니다';
                    workTimeElapsed = actualWorkHours * 3600; // 실제 근무시간만큼 표시
                } else {
                    // 근무 시간 중
                    isWorkTime = true;
                    document.getElementById('currentAmountSection').style.display = 'block';
                    document.getElementById('perSecondSection').style.display = 'none';
                    let elapsed = (now - startDate) / 1000;
                    workTimeElapsed = Math.max(0, elapsed);
                    progressText.textContent = '근무중 화이팅!';
                }

                // perSecondSection 표시 여부 (근무 중일 때만 숨김)
                if (isWorkTime) {
                    document.getElementById('perSecondSection').style.display = 'none';
                } else {
                    document.getElementById('perSecondSection').style.display = 'block';
                }

                const earned = secondly * workTimeElapsed;
                const progressPercent = (workTimeElapsed / totalWorkSeconds) * 100;

                // 금액 표시
                const formatted = new Intl.NumberFormat('ko-KR', {
                    style: 'currency',
                    currency: 'KRW',
                    minimumFractionDigits: 2,
                    maximumFractionDigits: 2
                }).format(earned);

                currentAmount.textContent = formatted;

                // 진행률 표시
                const clampedProgress = Math.min(100, progressPercent);
                progressFill.style.width = clampedProgress + '%';

                // 아이템 획득 (근무시간에만)
                if (isWorkTime) {
                    checkAndAcquireItem(earned, 300, 'item1', '🍭 츄파춥스 획득!');
                    checkAndAcquireItem(earned, 1000, 'item2', '🥤 박카스 획득!');
                    checkAndAcquireItem(earned, 2500, 'item3', '🍞 포켓몬빵 획득!');
                    checkAndAcquireItem(earned, 2800, 'item4', '🍨 아이스아메리카노 획득!');
                    checkAndAcquireItem(earned, 3200, 'item5', '🚌 오늘 왕복 교통비 획득!');
                    checkAndAcquireItem(earned, 15000, 'item6', '🎬 영화 관람권 획득!');
                    checkAndAcquireItem(earned, 30000, 'item7', '🍗 치킨 한마리 획득!');
                    checkAndAcquireItem(earned, 50000, 'item8', '🛍️ 올리브영 털이 가즈아!');
                }

                animationFrameId = requestAnimationFrame(update);
            }

            update();
        }

        function checkAndAcquireItem(earned, threshold, itemId, itemName) {
            if (earned >= threshold && !acquiredItems.has(itemId)) {
                acquiredItems.add(itemId);
                showItemText(itemName);
            }
        }

        function showItemText(itemName) {
            itemsText.textContent = itemName;
            
            itemTimeouts.forEach(t => clearTimeout(t));
            itemTimeouts = [];

            const timeout = setTimeout(() => {
                itemsText.textContent = '';
            }, 3000);

            itemTimeouts.push(timeout);
        }

        // 초기화
        function init() {
            const saved = localStorage.getItem('salaryLiveSettings');
            if (saved) {
                settings = JSON.parse(saved);
                showMainScreen();
            } else {
                showSettingsScreen();
            }
        }

        init();
    </script>

    <!-- 토스 배너 광고 SDK -->
    <script src="https://cdn.appstoss.io/web-framework/toss-ads-sdk.js"></script>
    <script type="module">
        import { TossAds } from '@apps-in-toss/web-framework';

        let attachedBanner = null;

        function initializeTossAds() {
            if (!TossAds) { return; }
            if (!TossAds.initialize.isSupported()) { return; }

            TossAds.initialize({
                callbacks: {
                    onInitialized: () => { 
                        console.log('✅ Toss Ads SDK 초기화 완료');
                        attachBannerAd(); 
                    },
                    onInitializationFailed: (error) => {
                        console.error('❌ Toss Ads SDK 초기화 실패:', error);
                    }
                }
            });
        }

        function attachBannerAd() {
            if (!TossAds) { return null; }
            const adContainer = document.getElementById('toss-ad-container');
            if (!adContainer) { return null; }

            const adGroupId = 'ait.v2.live.9531ba5258114c4f';

            try {
                const result = TossAds.attachBanner(adGroupId, adContainer, {
                    theme: 'auto',
                    tone: 'blackAndWhite',
                    variant: 'expanded',
                    callbacks: {
                        onAdRendered: (payload) => { 
                            console.log('👁️ 광고 렌더링 완료');
                            adContainer.classList.add('show'); 
                        },
                        onAdViewable: (payload) => {
                            console.log('💰 광고 노출 기록 (수익 발생)');
                        },
                        onAdImpression: (payload) => {
                            console.log('📢 광고 노출됨');
                        },
                        onAdClicked: (payload) => {
                            console.log('🖱️ 광고 클릭됨');
                        },
                        onNoFill: (payload) => { 
                            console.warn('⚠️ 표시할 광고가 없습니다');
                            adContainer.classList.remove('show'); 
                        },
                        onAdFailedToRender: (payload) => { 
                            console.error('❌ 광고 렌더링 실패:', payload.error.message);
                            adContainer.classList.remove('show'); 
                        }
                    }
                });
                return result;
            } catch (error) {
                console.error('광고 부착 중 오류:', error);
                return null;
            }
        }

        window.addEventListener('load', () => { initializeTossAds(); });
    </script>
