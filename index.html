<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>머니카운팅 - Money Counting</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            color: #1a1a1a;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 420px;
            background: #f8f9fa;
            padding: 40px 30px;
            border-radius: 20px;
            min-height: 600px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }

        .header {
            margin-bottom: 40px;
        }

        .title {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #1a1a1a;
        }

        .highlight {
            color: #FF6B9D;
        }

        .subtitle {
            font-size: 13px;
            color: #666;
            line-height: 1.6;
        }

        .section {
            margin-bottom: 25px;
        }

        .section-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .button-group {
            display: flex;
            gap: 10px;
        }

        .btn-tab {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            background: #ffffff;
            color: #666;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-tab.active {
            border-color: #FF6B9D;
            background: rgba(255, 107, 157, 0.1);
            color: #FF6B9D;
        }

        .input-group {
            margin-bottom: 18px;
        }

        .input-label {
            display: block;
            font-size: 12px;
            color: #666;
            margin-bottom: 8px;
            font-weight: 500;
        }

        input[type="text"],
        input[type="number"],
        input[type="time"],
        select {
            width: 100%;
            padding: 12px 10px;
            padding-right: 30px;
            border: 1px solid #ddd;
            background: #ffffff;
            color: #1a1a1a;
            border-radius: 10px;
            font-size: 13px;
            font-family: inherit;
            text-align-last: center;
            text-align: center;
            direction: ltr;
        }

        select option {
            color: #1a1a1a;
            background: #ffffff;
            font-size: 13px;
        }

        input::placeholder {
            color: #999;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: #FF6B9D;
            box-shadow: 0 0 0 2px rgba(255, 107, 157, 0.1);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px;
            background: rgba(255, 107, 157, 0.08);
            border: 1px solid rgba(255, 107, 157, 0.3);
            border-radius: 10px;
            cursor: pointer;
        }

        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #FF6B9D;
        }

        .checkbox-label {
            font-size: 13px;
            color: #1a1a1a;
            cursor: pointer;
            flex: 1;
        }

        .guide-text {
            font-size: 11px;
            color: #666;
            margin-top: 8px;
            padding: 10px;
            background: #f0f0f0;
            border-radius: 8px;
            border-left: 2px solid #FF6B9D;
        }

        .btn-primary {
            width: 100%;
            padding: 16px;
            background: #FF6B9D;
            border: none;
            color: #fff;
            font-size: 15px;
            font-weight: 700;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: auto;
        }

        .btn-primary:hover {
            background: #FF5B8D;
        }

        /* 메인 화면 */
        .main-screen {
            display: none;
            flex-direction: column;
        }

        .main-screen.active {
            display: flex;
        }

        .main-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .settings-btn {
            width: 36px;
            height: 36px;
            border: 1px solid #ddd;
            background: #ffffff;
            color: #666;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.2s;
        }

        .settings-btn:hover {
            border-color: #FF6B9D;
            color: #FF6B9D;
        }

        .current-amount {
            text-align: center;
            margin-bottom: 50px;
        }

        .amount-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .amount-value {
            font-size: 48px;
            font-weight: 800;
            color: #FF6B9D;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', monospace;
            margin-bottom: 20px;
            word-break: break-all;
        }

        .disclaimer-text {
            font-size: 11px;
            color: #999;
            text-align: center;
            margin-bottom: 12px;
            line-height: 1.4;
        }

        .progress-section {
            background: rgba(255, 107, 157, 0.1);
            border: 1px solid rgba(255, 107, 157, 0.3);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
        }

        .progress-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #FF6B9D, #FF8BAE);
            transition: width 0.3s;
        }

        .progress-text {
            font-size: 13px;
            color: #FF6B9D;
            font-weight: 600;
        }

        .items-text {
            font-size: 12px;
            color: #FF6B9D;
            margin-bottom: 30px;
            min-height: 20px;
            text-align: center;
        }

        .subtitle-text {
            font-size: 11px;
            color: #666;
            line-height: 1.6;
            text-align: center;
            margin-top: 15px;
            background: #ffffff;
            padding: 14px 12px;
            border-radius: 10px;
            border: 1px solid #f0f0f0;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .reset-btn {
            width: 100%;
            padding: 14px;
            background: #ffffff;
            border: 1px solid #ddd;
            color: #666;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .reset-btn:hover {
            border-color: #FF6B9D;
            color: #FF6B9D;
        }

        .hidden {
            display: none !important;
        }

        .two-column {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 설정 화면 -->
        <div class="settings-screen" id="settingsScreen">
            <div class="header">
                <div class="title">어차피 나는<br><span class="highlight">지금도 번다</span></div>
            </div>

            <!-- 1단계: 급여 방식 -->
            <div class="section">
                <div class="section-label">급여 방식</div>
                <div class="button-group">
                    <button class="btn-tab active" data-salary-type="hourly">시급</button>
                    <button class="btn-tab" data-salary-type="monthly">월급</button>
                    <button class="btn-tab" data-salary-type="annual">연봉</button>
                </div>
            </div>

            <!-- 2단계: 금액 입력 -->
            <div class="section">
                <div class="input-group">
                    <label class="input-label" id="amountLabel">시급 입력 (원)</label>
                    <input type="text" id="amountInput" placeholder="예: 12000" inputmode="numeric">
                </div>
                <div class="guide-text" id="guideText">시급을 입력해주세요</div>
            </div>

            <!-- 3단계: 세후 여부 -->
            <div class="section">
                <label class="checkbox-group">
                    <input type="checkbox" id="afterTaxCheckbox">
                    <span class="checkbox-label">이미 세후(실수령액)로 입력했습니다</span>
                </label>
                <div class="guide-text">체크하지 않으면 평균 실수령액(약 75%) 기준으로 자동 계산됩니다</div>
            </div>

            <!-- 4단계: 근무시간 -->
            <div class="section">
                <div class="section-label">일일 근무시간</div>
                <input type="number" id="workHours" value="8" min="1" max="24" placeholder="8">
                <div class="guide-text">근무시간(점심 1시간 제외)</div>
            </div>

            <!-- 5단계: 근무 시간대 -->
            <div class="section">
                <div class="section-label">근무 시간대</div>
                <div class="two-column">
                    <div class="input-group">
                        <label class="input-label">시작 시간</label>
                        <div style="display: flex; gap: 8px;">
                            <select id="startAmpm" style="flex: 1;">
                                <option value="am">오전</option>
                                <option value="pm">오후</option>
                            </select>
                            <input type="number" id="startHour" min="1" max="12" value="9" placeholder="시간" style="flex: 1;">
                        </div>
                    </div>
                    <div class="input-group">
                        <label class="input-label">종료 시간</label>
                        <div style="display: flex; gap: 8px;">
                            <select id="endAmpm" style="flex: 1;">
                                <option value="am">오전</option>
                                <option value="pm" selected>오후</option>
                            </select>
                            <input type="number" id="endHour" min="1" max="12" value="6" placeholder="시간" style="flex: 1;">
                        </div>
                    </div>
                </div>
                <div class="guide-text">점심시간 1시간은 자동으로 제외됩니다</div>
            </div>

            <button class="btn-primary" id="saveBtn">저장하고 시작</button>
        </div>

        <!-- 메인 화면 -->
        <div class="main-screen" id="mainScreen">
            <!-- 배너 광고 (최상단) -->
            <div id="toss-ad-container" style="width: 100%; height: 96px; margin-bottom: 20px;"></div>

            <div class="main-header">
                <div>
                    <div class="title" style="margin-bottom: 4px;">머니 카운팅</div>
                    <div style="font-size: 13px; color: #FF6B9D; font-weight: 600;">Money Counting 🤑</div>
                </div>
                <button class="settings-btn" id="editBtn">⚙️</button>
            </div>

            <div class="current-amount">
                <div class="amount-label">현재까지 벌어들인 금액</div>
                <div class="amount-value" id="currentAmount">₩0.00</div>
                <div class="disclaimer-text">⚠️ 평균값 기준 계산으로, 실제와 다를 수 있습니다</div>
                <div class="items-text" id="itemsText"></div>
                <div class="subtitle-text">팀장이 욕할때도, 근무시간에 💩쌸때도,<br>고객이 욕할때도 나는 돈을 번다.<br><span style="font-weight: 700;">참자 참자 참자!</span></div>
            </div>

            <div class="progress-section">
                <div class="progress-label">오늘 근무 진행률</div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                </div>
                <div class="progress-text" id="progressText">0%</div>
            </div>

            <button class="reset-btn" id="resetBtn">설정 변경</button>
        </div>
    </div>

    <script>
        let settings = null;
        let isRunning = false;
        let animationFrameId = null;
        let acquiredItems = new Set();
        let itemTimeouts = [];

        // 요소 가져오기
        const settingsScreen = document.getElementById('settingsScreen');
        const mainScreen = document.getElementById('mainScreen');
        const salaryTypeButtons = document.querySelectorAll('.btn-tab');
        const amountInput = document.getElementById('amountInput');
        const amountLabel = document.getElementById('amountLabel');
        const guideText = document.getElementById('guideText');
        const afterTaxCheckbox = document.getElementById('afterTaxCheckbox');
        const workHours = document.getElementById('workHours');
        const startAmpm = document.getElementById('startAmpm');
        const startHour = document.getElementById('startHour');
        const endAmpm = document.getElementById('endAmpm');
        const endHour = document.getElementById('endHour');
        const saveBtn = document.getElementById('saveBtn');
        const editBtn = document.getElementById('editBtn');
        const resetBtn = document.getElementById('resetBtn');
        const currentAmount = document.getElementById('currentAmount');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        const itemsText = document.getElementById('itemsText');

        let selectedSalaryType = 'hourly';

        // 시간 변환 함수 (12시간 → 24시간)
        function convertTo24Hour(ampm, hour) {
            let h = parseInt(hour) || 9;
            if (ampm === 'pm' && h !== 12) {
                h += 12;
            } else if (ampm === 'am' && h === 12) {
                h = 0;
            }
            return String(h).padStart(2, '0') + ':00';
        }

        // 24시간 → 12시간 변환
        function convertTo12Hour(timeStr) {
            const [hour] = timeStr.split(':');
            let h = parseInt(hour);
            const ampm = h >= 12 ? 'pm' : 'am';
            if (h > 12) {
                h -= 12;
            } else if (h === 0) {
                h = 12;
            }
            return { ampm, hour: h };
        }

        // 급여 방식 선택
        salaryTypeButtons.forEach(btn => {
            btn.addEventListener('click', (e) => {
                salaryTypeButtons.forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                selectedSalaryType = e.target.dataset.salaryType;

                const labels = {
                    hourly: '시급 입력 (원)',
                    monthly: '월급 입력 (원)',
                    annual: '연봉 입력 (원)'
                };
                const guides = {
                    hourly: '시급을 입력해주세요',
                    monthly: '월급을 입력해주세요',
                    annual: '연봉을 입력해주세요'
                };

                amountLabel.textContent = labels[selectedSalaryType];
                guideText.textContent = guides[selectedSalaryType];
                amountInput.value = '';
                amountInput.focus();
            });
        });

        // 숫자 입력 포맷팅
        amountInput.addEventListener('input', (e) => {
            let value = e.target.value.replace(/[^\d]/g, '');
            if (value) {
                value = parseInt(value).toLocaleString('ko-KR');
            }
            e.target.value = value;
        });

        // 저장
        saveBtn.addEventListener('click', () => {
            const rawAmount = amountInput.value.replace(/,/g, '');
            const amount = parseFloat(rawAmount);

            if (!amount || amount <= 0) {
                alert('올바른 금액을 입력해주세요.');
                return;
            }

            const wHours = parseInt(workHours.value) || 8;
            const sTime = convertTo24Hour(startAmpm.value, startHour.value);
            const eTime = convertTo24Hour(endAmpm.value, endHour.value);
            const isAfterTax = afterTaxCheckbox.checked;

            settings = {
                salaryType: selectedSalaryType,
                amount: amount,
                afterTax: isAfterTax,
                workHours: wHours,
                startTime: sTime,
                endTime: eTime,
                savedAt: new Date().toISOString()
            };

            // 로컬스토리지에 저장
            localStorage.setItem('salaryLiveSettings', JSON.stringify(settings));

            // 화면 전환
            showMainScreen();
        });

        // 설정 변경
        editBtn.addEventListener('click', () => {
            loadSettingsToForm();
            showSettingsScreen();
        });

        // 리셋
        resetBtn.addEventListener('click', () => {
            loadSettingsToForm();
            showSettingsScreen();
        });

        // 설정값을 폼에 로드
        function loadSettingsToForm() {
            if (!settings) return;

            // 급여 방식 선택
            salaryTypeButtons.forEach(btn => {
                if (btn.dataset.salaryType === settings.salaryType) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
            selectedSalaryType = settings.salaryType;

            // 금액 입력
            amountInput.value = settings.amount.toLocaleString('ko-KR');

            // 세후 체크
            afterTaxCheckbox.checked = settings.afterTax;

            // 근무시간
            workHours.value = settings.workHours;

            // 시간대 변환 및 표시
            const startConverted = convertTo12Hour(settings.startTime);
            const endConverted = convertTo12Hour(settings.endTime);
            
            startAmpm.value = startConverted.ampm;
            startHour.value = startConverted.hour;
            endAmpm.value = endConverted.ampm;
            endHour.value = endConverted.hour;

            // 라벨 업데이트
            const labels = {
                hourly: '시급 입력 (원)',
                monthly: '월급 입력 (원)',
                annual: '연봉 입력 (원)'
            };
            amountLabel.textContent = labels[settings.salaryType];
        }

        // 화면 표시
        function showSettingsScreen() {
            settingsScreen.classList.remove('hidden');
            mainScreen.classList.remove('active');
        }

        function showMainScreen() {
            settingsScreen.classList.add('hidden');
            mainScreen.classList.add('active');
            startCounting();
        }

        // 시급 계산
        function getHourlyRate(amount, salaryType, afterTax) {
            let hourly = 0;

            if (salaryType === 'hourly') {
                hourly = amount;
            } else if (salaryType === 'monthly') {
                // 월급 → 시급 (월 160시간 기준)
                hourly = amount / 160;
            } else if (salaryType === 'annual') {
                // 연봉 → 시급 (연간 2080시간 기준: 52주 * 40시간)
                hourly = amount / 2080;
            }

            // 세후 처리
            if (!afterTax) {
                hourly = hourly * 0.75; // 평균 75% 실수령
            }

            return hourly;
        }

        // 초당 금액
        function getSecondlyRate(hourly) {
            return hourly / 3600;
        }

        // 카운팅 시작
        function startCounting() {
            if (!settings) return;

            isRunning = true;
            acquiredItems.clear();
            itemTimeouts.forEach(t => clearTimeout(t));
            itemTimeouts = [];

            const hourly = getHourlyRate(settings.amount, settings.salaryType, settings.afterTax);
            const secondly = getSecondlyRate(hourly);

            function update() {
                const now = new Date();
                const [startHour, startMin] = settings.startTime.split(':').map(Number);
                const [endHour, endMin] = settings.endTime.split(':').map(Number);

                const startDate = new Date(now.getFullYear(), now.getMonth(), now.getDate(), startHour, startMin);
                const endDate = new Date(now.getFullYear(), now.getMonth(), now.getDate(), endHour, endMin);
                const lunchStart = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 12, 0);
                const lunchEnd = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 13, 0);

                let workTimeElapsed = 0;
                let totalWorkSeconds = settings.workHours * 3600;
                let isOffWork = false;

                // 퇴근 시간 도달 확인
                if (now >= endDate) {
                    isOffWork = true;
                    // 퇴근했을 때: 종료시간까지만 계산
                    let elapsed = (endDate - startDate) / 1000;
                    elapsed -= 3600; // 점심시간 1시간 제외
                    workTimeElapsed = elapsed;
                } else if (now >= startDate) {
                    // 근무 시간 중
                    let elapsed = (now - startDate) / 1000;
                    
                    // 점심시간 제외
                    if (now > lunchStart && now < lunchEnd) {
                        const lunchElapsed = (now - lunchStart) / 1000;
                        elapsed -= lunchElapsed;
                    } else if (now >= lunchEnd) {
                        elapsed -= 3600; // 1시간 제외
                    }

                    workTimeElapsed = Math.max(0, elapsed);
                }

                const earned = secondly * workTimeElapsed;
                const progressPercent = (workTimeElapsed / totalWorkSeconds) * 100;

                // 금액 표시
                const formatted = new Intl.NumberFormat('ko-KR', {
                    style: 'currency',
                    currency: 'KRW',
                    minimumFractionDigits: 2,
                    maximumFractionDigits: 2
                }).format(earned);

                currentAmount.textContent = formatted;

                // 진행률 표시
                const clampedProgress = Math.min(100, progressPercent);
                progressFill.style.width = clampedProgress + '%';
                
                if (isOffWork) {
                    progressText.textContent = '퇴근 🎉';
                } else if (clampedProgress >= 85) {
                    progressText.textContent = '퇴근이 보인다!!!';
                } else {
                    progressText.textContent = Math.round(clampedProgress) + '%';
                }

                // 아이템 획득
                checkAndAcquireItem(earned, 300, 'item1', '🍭 츄파춥스 획득!');
                checkAndAcquireItem(earned, 1000, 'item2', '🥤 박카스 획득!');
                checkAndAcquireItem(earned, 2500, 'item3', '🍞 포켓몬빵 획득!');

                animationFrameId = requestAnimationFrame(update);
            }

            update();
        }

        function checkAndAcquireItem(earned, threshold, itemId, itemName) {
            if (earned >= threshold && !acquiredItems.has(itemId)) {
                acquiredItems.add(itemId);
                showItemText(itemName);
            }
        }

        function showItemText(itemName) {
            itemsText.textContent = itemName;
            
            itemTimeouts.forEach(t => clearTimeout(t));
            itemTimeouts = [];

            const timeout = setTimeout(() => {
                itemsText.textContent = '';
            }, 3000);

            itemTimeouts.push(timeout);
        }

        // 초기화
        function init() {
            const saved = localStorage.getItem('salaryLiveSettings');
            if (saved) {
                settings = JSON.parse(saved);
                showMainScreen();
            } else {
                showSettingsScreen();
            }
        }

        init();
    </script>

    <!-- 토스 배너 광고 SDK (공식) -->
    <script src="https://cdn.appstoss.io/web-framework/toss-ads-sdk.js"></script>
    <script type="module">
        import { TossAds } from '@apps-in-toss/web-framework';

        let attachedBanner = null;

        // 토스 광고 초기화
        function initializeTossAds() {
            // 지원 여부 확인
            if (!TossAds || !TossAds.initialize.isSupported()) {
                console.warn('배너 광고 기능을 사용할 수 없습니다.');
                return;
            }

            // SDK 초기화
            TossAds.initialize({
                callbacks: {
                    onInitialized: () => {
                        console.log('Toss Ads SDK 초기화 완료');
                        attachBannerAd();
                    },
                    onInitializationFailed: (error) => {
                        console.error('Toss Ads SDK 초기화 실패:', error);
                    },
                },
            });
        }

        // 배너 광고 부착
        function attachBannerAd() {
            if (!TossAds) return;

            const adContainer = document.getElementById('toss-ad-container');
            if (!adContainer) return;

            // 테스트 광고 ID (발급 후 실제 ID로 변경)
            const adGroupId = 'ait-ad-test-banner-id';

            try {
                attachedBanner = TossAds.attachBanner(adGroupId, adContainer, {
                    theme: 'auto',
                    tone: 'blackAndWhite',
                    variant: 'expanded',
                    callbacks: {
                        onAdRendered: (payload) => {
                            console.log('광고 렌더링 완료:', payload.slotId);
                        },
                        onAdImpression: (payload) => {
                            console.log('광고 노출됨:', payload.slotId);
                        },
                        onAdViewable: (payload) => {
                            console.log('광고 노출 기록됨 (수익 발생):', payload.slotId);
                        },
                        onAdClicked: (payload) => {
                            console.log('광고 클릭됨:', payload.slotId);
                        },
                        onAdFailedToRender: (payload) => {
                            console.error('광고 렌더링 실패:', payload.error.message);
                        },
                        onNoFill: (payload) => {
                            console.warn('표시할 광고가 없습니다:', payload.slotId);
                        },
                    },
                });
            } catch (error) {
                console.error('배너 광고 부착 실패:', error);
            }
        }

        // 페이지 로드 시 광고 초기화
        window.addEventListener('load', () => {
            initializeTossAds();
        });

        // 모듈 언마운트 시 광고 정리
        window.addEventListener('unload', () => {
            if (attachedBanner) {
                attachedBanner.destroy();
            }
            if (TossAds && TossAds.destroyAll) {
                TossAds.destroyAll();
            }
        });
    </script>

    <!-- 토스 배너 광고 SDK END -->
</body>
</html>
